<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Center Lead Tracker - Condux Tesmec</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        #container { display: flex; height: 100vh; }
        #sidebar { width: 400px; background: #1a1a1a; color: #fff; overflow-y: auto; display: flex; flex-direction: column; }
        #map { flex: 1; }
        .header { padding: 20px; background: #0066cc; }
        .header h1 { font-size: 20px; margin-bottom: 5px; }
        .header p { font-size: 12px; opacity: 0.9; }
        .tabs { display: flex; background: #2a2a2a; border-bottom: 1px solid #444; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 11px; border-bottom: 2px solid transparent; }
        .tab:hover { background: #333; }
        .tab.active { border-bottom-color: #0066cc; color: #0066cc; }
        .tab-content { display: none; flex: 1; overflow-y: auto; }
        .tab-content.active { display: block; }
        .stats { padding: 20px; border-bottom: 1px solid #333; }
        .stat-item { margin-bottom: 15px; }
        .stat-label { font-size: 11px; text-transform: uppercase; opacity: 0.6; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #0066cc; }
        .filters { padding: 20px; border-bottom: 1px solid #333; }
        .filter-group { margin-bottom: 15px; }
        .filter-group label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
        .filter-group select, .filter-group input { width: 100%; padding: 8px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px; }
        .filter-group input[type="checkbox"] { width: auto; margin-right: 8px; }
        .project-list, .company-list, .utility-list { padding: 20px; }
        .project-card, .company-card, .utility-card { background: #2a2a2a; padding: 15px; margin-bottom: 10px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .project-card:hover, .company-card:hover, .utility-card:hover { background: #333; }
        .project-card.hot-lead { border-left: 4px solid #ff3333; }
        .project-card.warm-lead { border-left: 4px solid #ff9900; }
        .project-card.open-slot { border-left: 3px solid #00cc66; }
        .lead-badge { display: inline-block; padding: 2px 6px; font-size: 9px; border-radius: 3px; margin-right: 5px; font-weight: bold; }
        .lead-badge.hot { background: #ff3333; color: #fff; }
        .lead-badge.warm { background: #ff9900; color: #000; }
        .project-name, .company-name, .utility-name { font-weight: bold; margin-bottom: 5px; }
        .project-location { font-size: 12px; opacity: 0.7; margin-bottom: 8px; }
        .project-value { font-size: 11px; color: #00cc66; margin-top: 5px; }
        .company-role, .utility-pipeline { font-size: 11px; color: #0066cc; margin-bottom: 8px; }
        .company-contact { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
        .company-contact a { color: #00cc66; text-decoration: none; }
        .company-contact a:hover { text-decoration: underline; }
        .company-projects { font-size: 11px; opacity: 0.6; margin-top: 8px; }
        .project-status { display: inline-block; padding: 3px 8px; font-size: 10px; border-radius: 3px; background: #444; margin-right: 5px; }
        .project-status.live { background: #00cc66; color: #000; }
        .project-status.construction { background: #ff9900; color: #000; }
        .project-status.approved { background: #0066cc; }
        .project-mw { font-size: 12px; opacity: 0.8; }
        .leaflet-popup-content-wrapper { background: #1a1a1a; color: #fff; }
        .leaflet-popup-content { margin: 15px; min-width: 250px; }
        .leaflet-popup-tip { background: #1a1a1a; }
        .popup-title { font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        .popup-row { margin-bottom: 8px; font-size: 13px; }
        .popup-label { opacity: 0.6; margin-right: 5px; }
        .popup-open-slot { color: #00cc66; font-weight: bold; margin-top: 10px; }
        .custom-marker { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }
        .marker-hot { background: #ff3333; box-shadow: 0 0 10px #ff3333; }
        .marker-warm { background: #ff9900; }
        .marker-open { background: #00cc66; }
        .marker-closed { background: #0066cc; }
        .chart-container { padding: 20px; }
        .chart-box { background: #2a2a2a; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .chart-title { font-size: 14px; font-weight: bold; margin-bottom: 15px; color: #0066cc; }
        canvas { max-height: 300px; }
    </style>
</head>
<body>
    <div id="container">
        <div id="sidebar">
            <div class="header">
                <h1>🏢 Data Center Lead Tracker</h1>
                <p>Condux Tesmec Sales Intelligence</p>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('projects')">Projects</div>
                <div class="tab" onclick="switchTab('utilities')">Utilities</div>
                <div class="tab" onclick="switchTab('companies')">Companies</div>
                <div class="tab" onclick="switchTab('analytics')">Analytics</div>
            </div>
            <div id="projects-tab" class="tab-content active">
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">Total Projects</div>
                        <div class="stat-value" id="stat-total">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Total Capacity</div>
                        <div class="stat-value" id="stat-capacity">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Equipment Value</div>
                        <div class="stat-value" id="stat-value" style="color: #00cc66;">-</div>
                    </div>
                </div>
                <div class="filters">
                    <div class="filter-group">
                        <label>Lead Priority</label>
                        <select id="filter-priority">
                            <option value="">All Leads</option>
                            <option value="hot">🔥 Hot Leads</option>
                            <option value="warm">⚡ Warm Leads</option>
                            <option value="open">💚 Open Opportunities</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="filter-status">
                            <option value="">All Statuses</option>
                            <option value="Approved">Approved</option>
                            <option value="Under Construction">Under Construction</option>
                            <option value="Permitting">Permitting</option>
                            <option value="Live">Live</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Min Capacity (MW)</label>
                        <input type="number" id="filter-mw" placeholder="e.g. 200">
                    </div>
                </div>
                <div class="project-list" id="project-list"></div>
            </div>
            <div id="utilities-tab" class="tab-content">
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">Total Utilities</div>
                        <div class="stat-value" id="util-count">-</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Top Opportunity</div>
                        <div class="stat-value" id="util-top" style="font-size: 16px;">-</div>
                    </div>
                </div>
                <div class="utility-list" id="utility-list"></div>
            </div>
            <div id="companies-tab" class="tab-content">
                <div class="filters">
                    <div class="filter-group">
                        <label>Company Type</label>
                        <select id="filter-company-role">
                            <option value="">All Types</option>
                            <option value="Owner">Owners/Operators</option>
                            <option value="Developer">Developers</option>
                            <option value="EPC">EPC Contractors</option>
                            <option value="Electrical">Electrical Contractors</option>
                            <option value="Utility">Utilities</option>
                        </select>
                    </div>
                </div>
                <div class="company-list" id="company-list"></div>
            </div>
            <div id="analytics-tab" class="tab-content">
                <div class="chart-container">
                    <div class="chart-box">
                        <div class="chart-title">Pipeline by Status</div>
                        <canvas id="statusChart"></canvas>
                    </div>
                    <div class="chart-box">
                        <div class="chart-title">Top 10 States by Capacity</div>
                        <canvas id="stateChart"></canvas>
                    </div>
                    <div class="chart-box">
                        <div class="chart-title">Top Owners/Operators</div>
                        <canvas id="ownerChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div id="map"></div>
    </div>
    <script>
        const map = L.map('map').setView([39.8283, -98.5795], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);
        
        let projects = [], companies = [], utilities = [], analytics = {}, markers = [];
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const tabs = ['projects', 'utilities', 'companies', 'analytics'];
            const idx = tabs.indexOf(tab);
            document.querySelectorAll('.tab')[idx].classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            if (tab === 'companies') loadCompanies();
            if (tab === 'utilities') loadUtilities();
            if (tab === 'analytics') loadAnalytics();
        }
        
        function getLeadScore(p) {
            const isHot = (p.status === 'Approved' || p.status === 'Under Construction') && 
                          p.utility && !p.epc && p.est_mw >= 200;
            const isWarm = (p.status === 'Permitting' || p.status === 'Approved') && 
                           p.utility && !p.epc;
            return isHot ? 'hot' : isWarm ? 'warm' : p.has_open_slots ? 'open' : 'cold';
        }
        
        async function loadStats() {
            const res = await fetch('/api/stats');
            const stats = await res.json();
            document.getElementById('stat-total').textContent = stats.total_projects;
            document.getElementById('stat-capacity').textContent = stats.total_capacity_mw.toFixed(0) + ' MW';
            document.getElementById('stat-value').textContent = '$' + (stats.total_capacity_mw * 2.5).toFixed(1) + 'M';
        }
        
        async function loadProjects() {
            const params = new URLSearchParams();
            const status = document.getElementById('filter-status').value;
            const minMw = document.getElementById('filter-mw').value;
            const priority = document.getElementById('filter-priority').value;
            if (status) params.append('status', status);
            if (minMw) params.append('min_mw', minMw);
            const res = await fetch('/api/projects?' + params);
            projects = await res.json();
            projects.forEach(p => p.leadScore = getLeadScore(p));
            if (priority) {
                projects = projects.filter(p => p.leadScore === priority);
            }
            renderProjects();
            renderMap();
        }
        
        async function loadUtilities() {
            const res = await fetch('/api/utilities');
            utilities = await res.json();
            document.getElementById('util-count').textContent = utilities.length;
            if (utilities.length > 0) {
                document.getElementById('util-top').textContent = utilities[0].name;
            }
            renderUtilities();
        }
        
        async function loadCompanies() {
            const params = new URLSearchParams();
            const role = document.getElementById('filter-company-role').value;
            if (role) params.append('role', role);
            const res = await fetch('/api/companies?' + params);
            companies = await res.json();
            renderCompanies();
        }
        
        async function loadAnalytics() {
            const res = await fetch('/api/analytics');
            analytics = await res.json();
            renderCharts();
        }
        
        function renderProjects() {
            const list = document.getElementById('project-list');
            list.innerHTML = '';
            projects.sort((a, b) => {
                const scoreOrder = {hot: 0, warm: 1, open: 2, cold: 3};
                return scoreOrder[a.leadScore] - scoreOrder[b.leadScore];
            });
            projects.forEach(p => {
                const value = (p.est_mw || 0) * 2500;
                const card = document.createElement('div');
                card.className = 'project-card ' + (p.leadScore === 'hot' ? 'hot-lead' : p.leadScore === 'warm' ? 'warm-lead' : p.has_open_slots ? 'open-slot' : '');
                card.innerHTML = `
                    ${p.leadScore === 'hot' ? '<span class="lead-badge hot">🔥 HOT</span>' : ''}
                    ${p.leadScore === 'warm' ? '<span class="lead-badge warm">⚡ WARM</span>' : ''}
                    <div class="project-name">${p.name}</div>
                    <div class="project-location">${p.city}, ${p.state}</div>
                    <div>
                        <span class="project-status ${getStatusClass(p.status)}">${p.status}</span>
                        <span class="project-mw">${p.est_mw || '?'} MW</span>
                    </div>
                    <div class="project-value">Est. Equipment: $${(value/1000).toFixed(0)}K</div>
                `;
                card.onclick = () => flyToProject(p);
                list.appendChild(card);
            });
        }
        
        function renderUtilities() {
            const list = document.getElementById('utility-list');
            list.innerHTML = '';
            utilities.forEach(u => {
                const card = document.createElement('div');
                card.className = 'utility-card';
                card.innerHTML = `
                    <div class="utility-name">${u.name}</div>
                    <div class="utility-pipeline">${u.project_count} projects • ${u.total_mw.toFixed(0)} MW</div>
                    <div class="project-value">Equipment Value: $${(u.equipment_value/1000000).toFixed(1)}M</div>
                    <div class="company-contact">States: ${u.states.join(', ')}</div>
                `;
                list.appendChild(card);
            });
        }
        
        function renderCompanies() {
            const list = document.getElementById('company-list');
            list.innerHTML = '';
            companies.forEach(c => {
                const card = document.createElement('div');
                card.className = 'company-card';
                card.innerHTML = `
                    <div class="company-name">${c.name}</div>
                    <div class="company-role">${c.role}</div>
                    ${c.website ? `<div class="company-contact">🌐 <a href="${c.website}" target="_blank">${c.website.replace('https://', '')}</a></div>` : ''}
                    ${c.contact ? `<div class="company-contact">📞 ${c.contact}</div>` : ''}
                    <div class="company-projects">${c.project_count} project${c.project_count !== 1 ? 's' : ''}</div>
                `;
                list.appendChild(card);
            });
        }
        
        function renderCharts() {
            // Status Chart
            new Chart(document.getElementById('statusChart'), {
                type: 'bar',
                data: {
                    labels: analytics.status_breakdown.map(s => s.status),
                    datasets: [{
                        label: 'MW Capacity',
                        data: analytics.status_breakdown.map(s => s.mw),
                        backgroundColor: '#0066cc'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
            });
            
            // State Chart
            new Chart(document.getElementById('stateChart'), {
                type: 'bar',
                data: {
                    labels: analytics.state_breakdown.map(s => s.state),
                    datasets: [{
                        label: 'MW',
                        data: analytics.state_breakdown.map(s => s.mw),
                        backgroundColor: '#00cc66'
                    }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
            });
            
            // Owner Chart
            new Chart(document.getElementById('ownerChart'), {
                type: 'doughnut',
                data: {
                    labels: analytics.top_owners.map(o => o.name),
                    datasets: [{
                        data: analytics.top_owners.map(o => o.mw),
                        backgroundColor: ['#0066cc', '#00cc66', '#ff9900', '#ff3333', '#9933ff', '#33ccff', '#ffcc00', '#cc3366', '#66cc99', '#cc6633']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }
        
        function renderMap() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            projects.forEach(p => {
                if (!p.lat || !p.lon) return;
                const markerClass = p.leadScore === 'hot' ? 'marker-hot' : 
                                   p.leadScore === 'warm' ? 'marker-warm' :
                                   p.has_open_slots ? 'marker-open' : 'marker-closed';
                const icon = L.divIcon({
                    className: 'custom-marker ' + markerClass,
                    iconSize: [14, 14],
                    iconAnchor: [7, 7]
                });
                const marker = L.marker([p.lat, p.lon], { icon: icon })
                    .bindPopup(getPopupHTML(p))
                    .addTo(map);
                markers.push(marker);
            });
        }
        
        function getPopupHTML(p) {
            const value = (p.est_mw || 0) * 2500;
            return `
                <div class="popup-title">${p.name}</div>
                ${p.leadScore === 'hot' ? '<div class="popup-open-slot">🔥 HOT LEAD - Contact utility now!</div>' : ''}
                <div class="popup-row"><span class="popup-label">Location:</span>${p.city}, ${p.state}</div>
                <div class="popup-row"><span class="popup-label">Status:</span>${p.status}</div>
                <div class="popup-row"><span class="popup-label">Capacity:</span>${p.est_mw || '?'} MW</div>
                <div class="popup-row"><span class="popup-label">Equipment Value:</span>$${(value/1000).toFixed(0)}K</div>
                ${p.utility ? `<div class="popup-row"><span class="popup-label">Utility:</span>${p.utility}</div>` : ''}
                ${p.owner ? `<div class="popup-row"><span class="popup-label">Owner:</span>${p.owner}</div>` : ''}
                ${p.epc ? `<div class="popup-row"><span class="popup-label">EPC:</span>${p.epc}</div>` : '<div class="popup-open-slot">⚡ No EPC assigned yet</div>'}
                ${p.sources ? `<div class="popup-row" style="margin-top:10px;font-size:11px;opacity:0.6;">Source: ${p.sources}</div>` : ''}
            `;
        }
        
        function getStatusClass(status) {
            if (status === 'Live') return 'live';
            if (status === 'Under Construction') return 'construction';
            if (status === 'Approved') return 'approved';
            return '';
        }
        
        function flyToProject(p) {
            if (p.lat && p.lon) {
                map.setView([p.lat, p.lon], 10, { animate: true });
            }
        }
        
        document.getElementById('filter-status').addEventListener('change', loadProjects);
        document.getElementById('filter-mw').addEventListener('input', loadProjects);
        document.getElementById('filter-priority').addEventListener('change', loadProjects);
        document.getElementById('filter-company-role').addEventListener('change', loadCompanies);
        
        loadStats();
        loadProjects();
    </script>
</body>
</html>
